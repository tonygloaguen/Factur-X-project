name: CD - Build & Push Docker (GHCR)

on:
  push:
    branches: ["main"]

# Un seul build à la fois sur main — annule le précédent si un nouveau push arrive
concurrency:
  group: cd-docker-${{ github.ref }}
  cancel-in-progress: true

# Permissions minimales au niveau workflow (top-level)
permissions:
  contents: read

jobs:
  build-and-push:
    # ubuntu-24.04 explicite pour la reproductibilité (pas ubuntu-latest qui change silencieusement)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        run: |
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=ghcr.io/${REPO_LC}/orchestrator" >> $GITHUB_ENV

      - name: Build & push (multi-arch)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f orchestrator/Dockerfile \
            -t $IMAGE:${{ env.SHA_SHORT }} \
            --push \
            orchestrator
