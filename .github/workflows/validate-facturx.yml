name: Validate Factur-X (XML EN16931 + Tests unitaires)

on:
  push:
  pull_request:
  workflow_dispatch:

# CKV2_GHA_1 : permissions minimales explicites (principe du moindre privilège)
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Tesseract + Ghostscript)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-fra tesseract-ocr-deu tesseract-ocr-eng \
            ghostscript

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyMuPDF factur-x lxml pypdf reportlab requests pytest

      - name: Run unit tests
        env:
          # FACTURX_PROFILE requis par facturx.py (module-level constant)
          FACTURX_PROFILE: en16931
          GEMINI_API_KEY: dummy-not-called-in-unit-tests
        run: |
          PYTHONPATH=orchestrator pytest tests/test_facturx_en16931.py -v

      - name: Validate embedded Factur-X XML (PDFs dans le repo)
        run: |
          python tools/ci_validate_facturx.py

  trivy:
    name: Trivy – scan CVE (Dockerfile + dépendances)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Scan de configuration du Dockerfile (USER, HEALTHCHECK, etc.)
      # exit-code: "1" → bloquant si une misconfiguration est détectée
      - name: Trivy – scan Dockerfile (config)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: config
          scan-ref: orchestrator/Dockerfile
          exit-code: "1"
          format: table

      # Scan des CVE dans les dépendances Python (requirements.txt)
      # Bloquant sur CRITICAL et HIGH uniquement
      - name: Trivy – scan filesystem (dépendances Python)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: orchestrator/
          scanners: vuln,secret
          exit-code: "1"
          format: table
          severity: CRITICAL,HIGH

  checkov:
    name: Checkov – audit Dockerfile et workflow
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Audit Dockerfile – bloquant
      # CKV_DOCKER_2 (HEALTHCHECK) et CKV_DOCKER_3 (USER non-root) sont couverts
      - name: Checkov – audit Dockerfile
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: orchestrator/
          framework: dockerfile
          soft_fail: false

      # Audit GitHub Actions – bloquant
      # CKV_GHA_1 (SHA pinning) est skip pour l'instant : haute maintenance, à traiter séparément
      - name: Checkov – audit GitHub Actions
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .github/workflows/
          framework: github_actions
          soft_fail: false
          skip_check: CKV_GHA_1
