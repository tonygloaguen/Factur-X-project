name: Validate Factur-X (XML EN16931 + Tests unitaires)

on:
  push:
    branches: [main]       # push limité à main ; les branches de travail passent par les PRs
  pull_request:
  workflow_dispatch:

# Annule les runs précédents sur la même branche/PR (économie de minutes CI)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CKV2_GHA_1 : permissions minimales globales (principe du moindre privilège)
# Aucun job n'a besoin d'écrire dans le dépôt ou de créer des artefacts GitHub.
permissions:
  contents: read

jobs:

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Tests unitaires + validation EN16931
  # ──────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate – Tests unitaires & EN16931
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt   # clé de cache basée sur le fichier versionné

      - name: Install system dependencies (Tesseract + Ghostscript)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-fra tesseract-ocr-deu tesseract-ocr-eng \
            ghostscript

      - name: Install Python dependencies (depuis requirements-ci.txt)
        run: pip install -r requirements-ci.txt

      - name: Run unit tests
        env:
          # FACTURX_PROFILE requis par facturx_utils.py (module-level constant)
          FACTURX_PROFILE: en16931
          GEMINI_API_KEY: dummy-not-called-in-unit-tests
        run: |
          PYTHONPATH=orchestrator pytest tests/test_facturx_en16931.py -v

      - name: Validate embedded Factur-X XML (PDFs dans le repo)
        run: |
          python tools/ci_validate_facturx.py

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Gitleaks : détection de secrets (bloquant)
  # ──────────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks – détection de secrets
    runs-on: ubuntu-24.04
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout (historique complet)
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0          # historique entier requis pour un scan exhaustif

      - name: Gitleaks – scan secrets (bloquant)
        # TODO : pinner sur SHA complet via Renovate/Dependabot (CKV_GHA_1)
        # Exemple : gitleaks/gitleaks-action@<sha256>
        # Repo public → GITHUB_TOKEN suffit ; repo privé → ajouter GITLEAKS_LICENSE secret
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Trivy : scan CVE Dockerfile + dépendances Python (bloquant)
  # ──────────────────────────────────────────────────────────────────────────────
  trivy:
    name: Trivy – scan CVE (Dockerfile + dépendances)
    runs-on: ubuntu-24.04
    needs: validate
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # Scan de configuration du Dockerfile (USER non-root, HEALTHCHECK, etc.)
      # exit-code: "1" → bloquant sur toute misconfiguration détectée
      - name: Trivy – scan Dockerfile (config)
        # TODO : pinner sur SHA complet via Renovate/Dependabot (CKV_GHA_1)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: config
          scan-ref: orchestrator/Dockerfile
          exit-code: "1"
          format: table

      # Scan CVE + secrets dans le filesystem Python — bloquant CRITICAL et HIGH uniquement
      - name: Trivy – scan filesystem (dépendances Python)
        # TODO : pinner sur SHA complet via Renovate/Dependabot (CKV_GHA_1)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: orchestrator/
          scanners: vuln,secret
          exit-code: "1"
          format: table
          severity: CRITICAL,HIGH

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Checkov : audit IaC Dockerfile + GitHub Actions (bloquant)
  # ──────────────────────────────────────────────────────────────────────────────
  checkov:
    name: Checkov – audit Dockerfile et workflow
    runs-on: ubuntu-24.04
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # Audit Dockerfile – bloquant
      # CKV_DOCKER_2 (HEALTHCHECK) et CKV_DOCKER_3 (USER non-root) sont couverts dans le Dockerfile
      - name: Checkov – audit Dockerfile
        # TODO : pinner sur SHA complet via Renovate/Dependabot (CKV_GHA_1)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: orchestrator/
          framework: dockerfile
          soft_fail: false

      # Audit GitHub Actions – bloquant
      # CKV_GHA_1 (SHA pinning des actions) est skipé temporairement :
      # nécessite un outillage dédié (Renovate/Dependabot) — à traiter séparément
      - name: Checkov – audit GitHub Actions
        # TODO : pinner sur SHA complet via Renovate/Dependabot (CKV_GHA_1)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .github/workflows/
          framework: github_actions
          soft_fail: false
          skip_check: CKV_GHA_1
