name: Validate Factur-X (XML EN16931 + Tests unitaires)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Tesseract + Ghostscript)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-fra tesseract-ocr-deu tesseract-ocr-eng \
            ghostscript

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyMuPDF factur-x lxml pypdf reportlab requests

      - name: Run unit tests
        env:
          # FACTURX_PROFILE requis par facturx.py (module-level constant)
          FACTURX_PROFILE: en16931
          GEMINI_API_KEY: dummy-not-called-in-unit-tests
        run: |
          PYTHONPATH=orchestrator pytest tests/test_facturx_en16931.py -v

      - name: Validate embedded Factur-X XML (PDFs dans le repo)
        run: |
          python tools/ci_validate_facturx.py
