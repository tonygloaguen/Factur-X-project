name: runner-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: self-hosted
    steps:
      - name: Identity check
        run: |
          echo "Hostname:"
          hostname
          echo "User:"
          whoami
          echo "Kernel:"
          uname -a
          echo "Docker version:"
          docker --version
