name: cd-deploy-staging

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

# CKV2_GHA_1 : permissions minimales — ce job n'écrit pas dans le dépôt
permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Pre-check Docker
        run: |
          docker --version
          docker compose version || true

      - name: Deploy staging (docker compose)
        working-directory: /opt/facturx-staging
        run: |
          docker compose pull
          docker compose up -d
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

      - name: Health check (container status)
        # L'orchestrateur n'expose pas de port HTTP — on vérifie via Docker health
        run: |
          sleep 5
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' orchestrator 2>/dev/null || echo "unknown")
          echo "Container health: $STATUS"
          docker ps --filter "name=orchestrator" --format "table {{.Names}}\t{{.Status}}"
