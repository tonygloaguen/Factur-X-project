# docker-compose.yml
# Orchestrateur LangGraph Factur-X — Architecture unifiée
# ========================================================
#
# Refactoring : 2 containers → 1 container
# Avant : orchestrateur (LangGraph) + facturx-service (Flask HTTP)
# Après : orchestrateur LangGraph pur (9 nœuds, 0 appel HTTP interne)
#
# Démarrage  : docker compose up -d --build
# Logs       : docker compose logs -f
# Arrêt      : docker compose down

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Orchestrateur LangGraph Factur-X
  #   Workflow : poll Gmail → OCR → Gemini → XML EN16931 → PDF/A-3 → Drive
  # ─────────────────────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    environment:
      # ── IA Gemini (requis) ───────────────────────────────────────────────
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      # Profil Factur-X : DOIT être exactement "en16931" (minuscules)
      - FACTURX_PROFILE=${FACTURX_PROFILE:-en16931}

      # ── Google Drive ─────────────────────────────────────────────────────
      # ID du dossier racine Drive (extrait de l'URL, pas l'URL entière)
      - DRIVE_FOLDER_ID=${DRIVE_FOLDER_ID:-}

      # ── Gmail ────────────────────────────────────────────────────────────
      # Intervalle de polling en secondes (900 = 15 minutes)
      - POLL_INTERVAL=${POLL_INTERVAL:-900}
      # Label appliqué aux emails traités
      - GMAIL_LABEL=${GMAIL_LABEL:-Factures-Traitées}
      # Requête Gmail pour trouver les factures non-traitées
      - GMAIL_QUERY=${GMAIL_QUERY:-has:attachment filename:pdf -label:Factures-Traitées}

      # ── SQLite (anti-retraitement + suivi quota) ─────────────────────────
      - STATE_DB_PATH=/app/data/state.db

      # ── Throttling Gemini (tier gratuit) ─────────────────────────────────
      # Max emails traités par cycle de polling
      - MAX_EMAILS_PER_CYCLE=${MAX_EMAILS_PER_CYCLE:-3}
      # Pause minimum entre 2 appels Gemini (secondes)
      - MIN_SECONDS_BETWEEN_CALLS=${MIN_SECONDS_BETWEEN_CALLS:-15}
      # Quota journalier Gemini (tier gratuit ≈ 18 appels/jour)
      - MAX_GEMINI_REQUESTS_PER_DAY=${MAX_GEMINI_REQUESTS_PER_DAY:-18}

    volumes:
      # Credentials Google OAuth2 (fichier téléchargé depuis Google Cloud Console)
      - ./orchestrator/credentials.json:/app/credentials.json:ro
      # Token OAuth2 (généré automatiquement à la première connexion)
      - ./orchestrator/token.json:/app/token.json
      # Volume persistant pour la base SQLite (survit aux redémarrages)
      - ./orchestrator_data:/app/data

    restart: unless-stopped
