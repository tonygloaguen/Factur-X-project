# docker-compose.yml
# Stack allégée : Orchestrateur LangGraph + Micro-service Factur-X
# ================================================================
#
# Seulement 2 conteneurs
#
# Démarrage : docker compose up -d --build
# Logs :      docker compose logs -f
# Test :      curl http://localhost:5000/health

services:
  # -------------------------------------------------------
  # Micro-service Factur-X (OCR + Gemini + Factur-X)
  # -------------------------------------------------------
  facturx-service:
    build:
      context: ./facturx-service
      dockerfile: Dockerfile
    container_name: facturx-service
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - FACTURX_PROFILE=${FACTURX_PROFILE:-en16931}
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - facturx-net

  # -------------------------------------------------------
  # Orchestrateur LangGraph
  # -------------------------------------------------------
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    environment:
      # URL interne du micro-service Factur-X (réseau Docker)
      - FACTURX_SERVICE_URL=http://facturx-service:5000
      # Intervalle de polling Gmail en secondes (900 = 15 min)
      - POLL_INTERVAL=${POLL_INTERVAL:-900}
      # ID du dossier racine Google Drive "Relevés bancaires et factures"
      - DRIVE_FOLDER_ID=${DRIVE_FOLDER_ID:-}
      # Label Gmail (optionnel – plus utilisé si SQLite est actif)
      - GMAIL_LABEL=${GMAIL_LABEL:-Factures-Traitées}
      # Filtre Gmail (listing uniquement, pas de tri métier)
      - GMAIL_QUERY=${GMAIL_QUERY:-has:attachment filename:pdf -label:Factures-Traitées}
      # SQLite state (anti-retraitement)
      - STATE_DB_PATH=/app/data/state.db
      # Throttling / quotas Gemini
      - MAX_EMAILS_PER_CYCLE=${MAX_EMAILS_PER_CYCLE:-3}
      - MIN_SECONDS_BETWEEN_CALLS=${MIN_SECONDS_BETWEEN_CALLS:-15}
      - MAX_GEMINI_REQUESTS_PER_DAY=${MAX_GEMINI_REQUESTS_PER_DAY:-18}
    volumes:
      # Credentials Google OAuth
      - ./orchestrator/credentials.json:/app/credentials.json:ro
      - ./orchestrator/token.json:/app/token.json
      # Volume persistant pour SQLite
      - ./orchestrator_data:/app/data
    depends_on:
      facturx-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - facturx-net

networks:
  facturx-net:
    driver: bridge

volumes:
  orchestrator_data:
